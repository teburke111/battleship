version: "3.9"

services:
  client:
    image: thomasb111/react_client:latest
    container_name: react_client
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server

  server:
    image: thomasb111/node_server:latest
    container_name: node_server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
